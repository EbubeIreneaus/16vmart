<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Your Password</title>
  </head>
  <body style="font-family: Arial, sans-serif; background-color: #f7f7f7; padding: 20px;">
    <div style="max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 8px;">
      <h2 style="color: #333;">Reset Your Password</h2>
      <p style="color: #555; font-size: 16px;">
        We received a request to reset your password. Copy and paste the link below in your browser or click the button below to continue.
      </p>
      <p>
        {{url}}
      </p>
      <a href="{{ url }}"
         style="display: inline-block; margin-top: 20px; padding: 12px 20px; background-color: #dc2626; color: white; text-decoration: none; border-radius: 5px;">
        Reset Password
      </a>
      <p style="color: #777; font-size: 14px; margin-top: 20px;">
        If you did not request this, you can safely ignore this email.
      </p>
    </div>
  </body>
</html>
